<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bet Tracker">
  <meta name="description" content="Live 2026 FIFA World Cup accumulator tracker">
  <title>⚽ Bet Tracker — WC 2026</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <header>
    <div class="header-top">
      <h1>⚽ <span>Bet</span>Tracker</h1>
      <div class="header-meta">
        <span class="updated-label" id="updated-label">Loading…</span>
        <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="active">Active</button>
      <button class="tab-btn" data-tab="settled">Settled</button>
    </div>
  </header>

  <main>
    <div id="bets-container">
      <div class="empty-state">
        <span class="icon">⏳</span>
        Loading bets…
      </div>
    </div>
  </main>

  <footer>
    ⚠️ Unofficial live indicator built on BALLDONTLIE data — <strong>Betway's settlement is final.</strong>
    <br>Tackles won &amp; other stats may differ between providers. Cash-out values can't be replicated.
  </footer>

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
