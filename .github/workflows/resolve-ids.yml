name: Resolve IDs

on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve team/player/match IDs
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: node backend/resolve_ids.js

      - name: Commit resolved IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/bets.resolved.json
          git diff --cached --quiet || git commit -m "chore: update bets.resolved.json [skip ci]"
          git push
